name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create app com.viora.hypernova HyperNovaBrowser
          cd app
          cordova platform add android

      - name: Copy HTML file
        run: |
          cp HyperNova_v4.html app/www/index.html
          cp logo_512x512.png app/www/img/logo.png || true

      - name: Update config.xml
        run: |
          cat > app/config.xml << 'EOF'
          <?xml version='1.0' encoding='utf-8'?>
          <widget id="com.viora.hypernova" version="1.0.0"
            xmlns="http://www.w3.org/ns/widgets"
            xmlns:cdv="http://cordova.apache.org/ns/1.0">
            <name>HyperNova Browser</name>
            <description>HyperNova Browser by Viora</description>
            <author email="dev@viora.app" href="https://viora.app">Viora</author>
            <content src="index.html" />
            <allow-intent href="http://*/*" />
            <allow-intent href="https://*/*" />
            <access origin="*" />
            <allow-navigation href="*" />
            <preference name="AndroidInsecureFileModeEnabled" value="true" />
          </widget>
          EOF

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Build APK
        run: |
          cd app
          cordova build android --release -- --packageType=apk

      - name: Sign APK
        run: |
          cd app/platforms/android/app/build/outputs/apk/release/
          keytool -genkey -v -keystore release.keystore -alias viora -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Viora, OU=Dev, O=Viora, L=Cairo, S=Cairo, C=EG" \
            -storepass viora123 -keypass viora123
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore release.keystore -storepass viora123 -keypass viora123 \
            app-release-unsigned.apk viora
          zipalign -v 4 app-release-unsigned.apk HyperNova.apk

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: HyperNova-APK
          path: app/platforms/android/app/build/outputs/apk/release/HyperNova.apk
